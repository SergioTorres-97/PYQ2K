{% if status == 'pending' %}
  <span class="badge bg-secondary"><i class="bi bi-clock"></i> Pendiente</span>
{% elif status == 'running' %}
  <span class="badge bg-primary"><span class="spinner-border spinner-border-sm me-1"></span>Ejecutando</span>
{% elif status == 'done' %}
  <span class="badge bg-success"><i class="bi bi-check-lg"></i> Completado</span>
{% elif status == 'error' %}
  <span class="badge bg-danger"><i class="bi bi-x-lg"></i> Error</span>
{% endif %}
