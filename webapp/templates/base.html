<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PYQ2K{% endblock %} — QUAL2K</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .status-pending  { color: #6c757d; }
    .status-running  { color: #0d6efd; }
    .status-done     { color: #198754; }
    .status-error    { color: #dc3545; }
    .kge-excellent { background: #a3cfbb; }
    .kge-good      { background: #c7f0d8; }
    .badge.kge-good-badge { background-color: #5cb87a !important; color: #fff; }
    .kge-good-text { color: #1a7a42 !important; }
    .kge-medium    { background: #fff3cd; }
    .kge-bad       { background: #f8d7da; }
    .graph-img  { max-width: 100%; border-radius: 6px; margin-bottom: 12px; cursor: zoom-in; }
    pre.error-box { background:#fff5f5; border:1px solid #f5c6cb; padding:1rem; border-radius:6px; font-size:.85rem; }
  </style>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'simulator:index' %}">
      <i class="bi bi-water"></i> PYQ2K
    </a>
    <span class="navbar-text text-secondary small">QUAL2K Water Quality Model</span>
  </div>
</nav>

<div class="container-xl pb-5">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
    {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
